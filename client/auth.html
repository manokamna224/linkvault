<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault — Login / Register</title>
  <link rel="stylesheet" href="/css/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a class="brand" href="/"><span class="brand-icon">🔗</span><span class="brand-text">LinkVault</span></a>
    <div class="nav-actions" style="margin-left:auto">
      <a href="/" class="nav-btn">← Browse</a>
      <button class="nav-btn" id="theme-toggle">🌙</button>
    </div>
  </div>
</nav>

<div style="min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)">
  <div class="form-card" style="width:100%">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2rem;margin-bottom:.4rem">🔗</div>
      <h2 style="font-size:1.3rem">Welcome to LinkVault</h2>
      <p>Sign in or create an account</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
    </div>

    <form id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" required placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" required placeholder="••••••••"/></div>
      <button type="submit" class="btn-primary">Sign In</button>
      <p class="form-msg" id="login-msg"></p>
    </form>

    <form id="register-form" style="display:none">
      <div class="form-group"><label>Username</label><input type="text" id="reg-username" required placeholder="cooldev42"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" required placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password <span style="color:var(--muted);font-weight:400">(min 8 chars)</span></label><input type="password" id="reg-password" required placeholder="••••••••" minlength="8"/></div>
      <button type="submit" class="btn-primary">Create Account</button>
      <p class="form-msg" id="register-msg"></p>
    </form>
  </div>
</div>

<script>
  const t = localStorage.getItem('lv_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  const tb = document.getElementById('theme-toggle');
  tb.textContent = t==='dark'?'☀️':'🌙';
  tb.onclick = () => { const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('lv_theme',n); tb.textContent=n==='dark'?'☀️':'🌙'; };

  if (localStorage.getItem('lv_token')) window.location.href='/';

  function showTab(tab) {
    document.getElementById('login-form').style.display    = tab==='login'   ?'':'none';
    document.getElementById('register-form').style.display = tab==='register'?'':'none';
    document.getElementById('tab-login').classList.toggle('active',    tab==='login');
    document.getElementById('tab-register').classList.toggle('active', tab==='register');
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('login-msg');
    msg.textContent = ''; msg.className = 'form-msg';
    try {
      const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('login-email').value,password:document.getElementById('login-password').value})});
      const data = await res.json();
      if (!res.ok){msg.textContent=data.error;msg.className='form-msg error';return;}
      localStorage.setItem('lv_token',data.token);
      localStorage.setItem('lv_user',JSON.stringify(data.user));
      window.location.href='/';
    } catch{msg.textContent='Network error';msg.className='form-msg error';}
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('register-msg');
    msg.textContent = ''; msg.className = 'form-msg';
    try {
      const res = await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('reg-username').value,email:document.getElementById('reg-email').value,password:document.getElementById('reg-password').value})});
      const data = await res.json();
      if (!res.ok){msg.textContent=data.error;msg.className='form-msg error';return;}
      localStorage.setItem('lv_token',data.token);
      localStorage.setItem('lv_user',JSON.stringify(data.user));
      window.location.href='/';
    } catch{msg.textContent='Network error';msg.className='form-msg error';}
  });
</script>
</body>
</html>
